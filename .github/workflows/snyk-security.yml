name: Snyk Security + Deploy

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  snyk-code-scan:
    name: Snyk Code (SAST)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: snyk/actions/setup@master

      - name: Snyk Code scan (upload report)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk code test --severity-threshold=high --sarif-file-output=snyk-code.sarif

      - name: Upload Code results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code

      - name: Snyk Code scan (fail gate)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk code test --severity-threshold=high

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [snyk-code-scan]

    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development')

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm add -g vercel@latest

      - name: Deploy to Vercel (build handled by Vercel)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            vercel deploy --prod --token=$VERCEL_TOKEN
          else
            vercel deploy --token=$VERCEL_TOKEN
          fi
